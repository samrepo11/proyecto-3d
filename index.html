<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi QR 3D</title>
    <!-- Cargamos la librería oficial -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f5f5f5; }
        model-viewer {
            width: 100vw;
            height: 80vh; /* Ocupa casi toda la pantalla */
            --poster-color: transparent;
        }
        .info {
            height: 20vh;
            padding: 20px;
            background: white;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            text-align: center;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <!-- El componente 3D -->
 <model-viewer alt="Neil Armstrong's Spacesuit from the Smithsonian Digitization Programs Office and National Air and Space Museum" 
     src="shared-assets/models/NeilArmstrong.glb" 
     ar environment-image="shared-assets/environments/moon_1k.hdr" 
     poster="shared-assets/models/NeilArmstrong.webp" 
     shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>

    <div class="info">
        <h2 style="margin:0">Astronauta Explorador</h2>
        <p>Escanea y proyecta este modelo 3D en tu entorno real.</p>
    </div>

</body>
</html>
