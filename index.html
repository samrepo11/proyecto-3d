<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi QR 3D</title>
    <!-- Cargamos la librería oficial -->
    <script type="module" src="https://googleapis.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f5f5f5; }
        model-viewer {
            width: 100vw;
            height: 80vh; /* Ocupa casi toda la pantalla */
            --poster-color: transparent;
        }
        .info {
            height: 20vh;
            padding: 20px;
            background: white;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            text-align: center;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <!-- El componente 3D -->
    <model-viewer 
        src="https://modelviewer.dev" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        alt="Un astronauta 3D">
        
        <!-- Botón para ver en AR (solo aparece en móviles compatibles) -->
        <button slot="ar-button" style="background-color: #007bff; color: white; border-radius: 8px; border: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; font-weight: bold;">
            🚀 VER EN MI SALA
        </button>
    </model-viewer>

    <div class="info">
        <h2 style="margin:0">Astronauta Explorador</h2>
        <p>Escanea y proyecta este modelo 3D en tu entorno real.</p>
    </div>

</body>
</html>
